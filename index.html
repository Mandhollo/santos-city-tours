function carouselNav(btn,dir){
  var carousel=btn.parentElement;
  var idx=parseInt(carousel.dataset.idx)||0;
  var total=parseInt(carousel.dataset.total)||1;
  idx+=dir;
  if(idx<0)idx=total-1;
  if(idx>=total)idx=0;
  carousel.dataset.idx=idx;
  var track=carousel.querySelector('.card-carousel-track');
  track.style.transform='translateX(-'+(idx*100)+'%)';
  var dots=carousel.querySelectorAll('.card-dot');
  for(var i=0;i<dots.length;i++){dots[i].classList.toggle('active',i===idx);}
}

// Touch swipe for carousels
document.addEventListener('touchstart',function(e){
  var carousel=e.target.closest('.card-carousel');
  if(!carousel)return;
  carousel._tx=e.touches[0].clientX;
  carousel._ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var carousel=e.target.closest('.card-carousel');
  if(!carousel||!carousel._tx)return;
  var dx=e.changedTouches[0].clientX-carousel._tx;
  var dy=e.changedTouches[0].clientY-carousel._ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    carouselNav(carousel.querySelector(dx>0?'.prev':'.next'),dx>0?-1:1);
  }
  carousel._tx=null;
},{passive:true});

function quizPick(el,tag){

function showRoute(time){
  var t=T[lang];
  var route=ROUTES[time];
  if(!route)return;
  var btns=document.querySelectorAll(".timeline-btn");
  for(var i=0;i<btns.length;i++) btns[i].classList.remove("active");
  event.target.classList.add("active");
  var totalMin=0;
  var h="";
  for(var i=0;i<route.length;i++){
    var step=route[i];
    var spot=null;
    for(var j=0;j<SPOTS.length;j++){if(SPOTS[j].id===step.id){spot=SPOTS[j];break;}}
    if(!spot)continue;
    totalMin+=step.dur;
    var loc=spot[lang];
    h+='<div class="timeline-step"><div class="timeline-line"><div class="timeline-dot"></div></div><div class="timeline-step-info"><div class="timeline-step-name">'+loc.n+'</div><div class="timeline-step-detail">'+step.dur+' min</div></div></div>';
  }
  h+='<div style="text-align:center;margin-top:8px;font-size:13px;color:#888">\u23f1 '+t.tlTitle.split(" ").slice(-1)[0]+': '+totalMin+' min</div>';
  var el=document.getElementById("timeline-route");
  el.innerHTML=h;
  el.style.display="block";
}

function renderCruises(){
  var sec=document.getElementById('cruise-section');
  if(!sec)return;
  var t=T[lang]||T.pt;
  var months=MONTHS[lang]||MONTHS.pt;
  document.getElementById('cruiseTitle').textContent=t.cruiseTitle;
  var today=new Date().toISOString().split('T')[0];
  var upcoming=CRUISES.filter(function(c){return c.d>=today;}).slice(0,10);
  if(!upcoming.length){sec.innerHTML='<div class="cruise-empty">'+t.cruiseNone+'</div>';return;}
  var h='';
  for(var i=0;i<upcoming.length;i++){
    var c=upcoming[i];
    var parts=c.d.split('-');
    var day=parseInt(parts[2]);
    var month=months[parseInt(parts[1])-1];
    var statusCls=c.type==='in'?'in':'out';
    var statusTxt=c.type==='in'?t.cruiseIn:t.cruiseOut;
    h+='<div class="cruise-card">';
    h+='<div class="cruise-date"><div class="cruise-date-day">'+day+'</div><div class="cruise-date-month">'+month+'</div></div>';
    h+='<div class="cruise-info"><div class="cruise-ship">'+c.ship+'</div><div class="cruise-line">'+c.line+'</div></div>';
    h+='<span class="cruise-status '+statusCls+'">'+statusTxt+'</span>';
    h+='</div>';
  }
  sec.innerHTML=h;
}

var userRating=0;
function renderRating(){
  var sec=document.getElementById('rate-section');
  if(!sec)return;
  var t=T[lang]||T.pt;
  var h='<div class="rate-title">'+t.rateTitle+'</div>';
  h+='<div class="rate-stars">';
  for(var i=1;i<=5;i++){
    h+='<span class="rate-star" data-v="'+i+'" onclick="setRate('+i+')">&#9733;</span>';
  }
  h+='</div>';
  h+='<div class="rate-msg" id="rateMsg">'+t.rateHint+'</div>';
  h+='<textarea class="rate-input" id="rateText" rows="2" placeholder="'+t.ratePlaceholder+'"></textarea>';
  h+='<br><button class="rate-send" id="rateSend" disabled onclick="sendRate()">'+t.rateSend+'</button>';
  sec.innerHTML=h;
  loadRatings();
}

function setRate(v){
  userRating=v;
  var stars=document.querySelectorAll('.rate-star');
  for(var i=0;i<stars.length;i++){
    stars[i].classList.toggle('active',parseInt(stars[i].dataset.v)<=v);
  }
  document.getElementById('rateSend').disabled=false;
}

function sendRate(){
  var text=(document.getElementById('rateText')||{}).value||'';
  var t=T[lang]||T.pt;
  var ratings=JSON.parse(localStorage.getItem('sct_ratings')||'[]');
  ratings.unshift({s:userRating,t:text.substring(0,200),d:new Date().toISOString().split('T')[0]});
  if(ratings.length>20)ratings=ratings.slice(0,20);
  localStorage.setItem('sct_ratings',JSON.stringify(ratings));
  document.getElementById('rateMsg').textContent=t.rateThanks;
  document.getElementById('rateSend').disabled=true;
  userRating=0;
  loadRatings();
}

function loadRatings(){
  var el=document.getElementById('rate-list');
  if(!el)return;
  var ratings=JSON.parse(localStorage.getItem('sct_ratings')||'[]');
  if(!ratings.length){el.innerHTML='';return;}
  var t=T[lang]||T.pt;
  var h='<div style="text-align:center;margin-bottom:8px;font-size:14px;font-weight:600">'+t.rateReviews+'</div>';
  var show=ratings.slice(0,5);
  for(var i=0;i<show.length;i++){
    var r=show[i];
    var stars='';
    for(var j=0;j<5;j++) stars+=j<r.s?'&#9733;':'&#9734;';
    h+='<div class="rate-item"><div class="rate-item-stars">'+stars+'</div>';
    if(r.t)h+='<div class="rate-item-text">'+r.t+'</div>';
    h+='<div class="rate-item-date">'+r.d+'</div></div>';
  }
  el.innerHTML=h;
}
