<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0f1a" id="themeColor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Santos Tours">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Santos City Tours</title>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0f1a;color:#e2e8f0;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(74,222,128,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(96,165,250,.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(168,85,247,.03) 0%,transparent 50%);z-index:-1;animation:bgFloat 20s ease-in-out infinite alternate;pointer-events:none}
@keyframes bgFloat{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-3%,2%) rotate(2deg)}}

/* ===== SIDEBAR OVERLAY ===== */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;opacity:0;visibility:hidden;transition:all .3s ease;backdrop-filter:blur(4px)}
.sidebar-overlay.open{opacity:1;visibility:visible}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;top:0;left:-100%;width:85vw;max-width:300px;height:100vh;background:rgba(12,17,30,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);z-index:999;transition:left .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;border-right:1px solid rgba(255,255,255,.05);padding-bottom:100px;box-shadow:4px 0 40px rgba(0,0,0,.4)}
.sidebar.open{left:0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(74,222,128,.2);border-radius:3px}

/* Header */
.sidebar-header{padding:24px 20px 18px;text-align:center;position:relative;background:linear-gradient(135deg,rgba(13,79,60,.4),rgba(26,122,90,.25));border-bottom:1px solid rgba(74,222,128,.1)}
.sidebar-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#0d4f3c,#1a7a5a);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:0 4px 12px rgba(13,79,60,.3)}
.sidebar-logo svg{width:24px;height:24px;color:#4ade80}
.sidebar-header h2{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-header .side-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.3px}
.sidebar-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);color:#64748b;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sidebar-close:hover{background:rgba(255,255,255,.15);color:#e2e8f0}

/* Language switcher */
.sidebar-lang{display:flex;gap:4px;padding:12px 16px;justify-content:center;border-bottom:1px solid rgba(255,255,255,.04)}
.sidebar-lang .lang-btn{background:transparent;border:1px solid rgba(255,255,255,.08);color:#64748b;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .25s}
.sidebar-lang .lang-btn.active{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:#4ade80}
.sidebar-lang .lang-btn:hover:not(.active){background:rgba(255,255,255,.04);color:#94a3b8}

/* Category labels */
.sidebar-label{padding:16px 18px 6px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#475569;user-select:none}

/* Nav items */
.sidebar-nav{padding:4px 0}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 14px 10px 18px;color:#94a3b8;min-height:42px;text-decoration:none;font-size:13px;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;text-align:left;position:relative;border-left:3px solid transparent;margin-bottom:1px}
.sidebar-item:hover{background:rgba(255,255,255,.03);color:#cbd5e1}
.sidebar-item.active{color:#4ade80;background:rgba(74,222,128,.06);border-left-color:#4ade80}
.sidebar-item .nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);flex-shrink:0;color:#64748b;transition:all .2s}
.sidebar-item .nav-icon svg{width:16px;height:16px}
.sidebar-item:hover .nav-icon{color:#94a3b8;background:rgba(255,255,255,.07)}
.sidebar-item.active .nav-icon{color:#4ade80;background:rgba(74,222,128,.12)}
.sidebar-item .nav-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .nav-badge{font-size:9px;font-weight:700;background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;padding:2px 6px;border-radius:6px;letter-spacing:.3px}

/* Divider */
.sidebar-divider{height:1px;background:rgba(255,255,255,.04);margin:6px 18px}

/* Theme toggle */
.sidebar-theme{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04);margin-top:8px}
.sidebar-theme span{font-size:12px;color:#64748b}
.theme-switch{position:relative;width:42px;height:24px;background:#1e293b;border-radius:12px;cursor:pointer;transition:background .3s;border:1px solid rgba(255,255,255,.08)}
.theme-switch.light{background:#4ade80;border-color:#4ade80}
.theme-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s}
.theme-switch.light::after{transform:translateX(18px)}

/* Light theme sidebar */
body.light .sidebar{background:rgba(255,255,255,.95);border-right-color:#e2e8f0}
body.light .sidebar-header{background:linear-gradient(135deg,rgba(13,79,60,.08),rgba(26,122,90,.04));border-bottom-color:rgba(13,79,60,.1)}
body.light .sidebar-label{color:#94a3b8}
body.light .sidebar-item{color:#475569;border-left-color:transparent}
body.light .sidebar-item:hover{background:rgba(0,0,0,.03);color:#334155}
body.light .sidebar-item.active{color:#0d4f3c;background:rgba(13,79,60,.06);border-left-color:#0d4f3c}
body.light .sidebar-item .nav-icon{background:rgba(0,0,0,.04);color:#94a3b8}
body.light .sidebar-item.active .nav-icon{color:#0d4f3c;background:rgba(13,79,60,.1)}
body.light .sidebar-close{background:rgba(0,0,0,.04);border-color:#e2e8f0;color:#94a3b8}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,26,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 20px rgba(0,0,0,.2)}
.topbar-hamburger{background:none;border:none;color:#e2e8f0;font-size:22px;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;transition:background .2s}
.topbar-hamburger:hover{background:rgba(255,255,255,.08)}
.topbar-title{flex:1;font-size:15px;font-weight:700;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:480px){.topbar-title{font-size:17px}}
.topbar-title .logo-icon{color:#4ade80;display:inline-flex;align-items:center;margin-right:4px}.topbar-title .logo-icon svg{width:22px;height:22px}
.topbar-wa{background:none;border:none;color:#25d366;font-size:22px;cursor:pointer;padding:4px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .2s;text-decoration:none}
.topbar-wa:hover{background:rgba(37,211,102,.1)}

/* ===== MAIN CONTENT ===== */
.main{max-width:600px;margin:0 auto;padding:0 0 80px}

/* Section wrapper with anchor */
.page-section{padding:0;display:none}
.page-section.active{display:block;animation:slideInLeft .35s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Section headers */
.sec-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:12px}
.sec-header h2{font-size:17px;font-weight:700;color:#e2e8f0;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.sec-header h2 .sec-icon{color:#4ade80;display:flex;align-items:center}
.sec-header h2 .sec-icon svg{width:20px;height:20px}
@media(min-width:480px){.sec-header h2{font-size:20px}}
.sec-header h2 .sec-icon{margin-right:6px}
.sec-header p{font-size:13px;color:#64748b;margin-top:4px}

/* ===== CARDS (Pontos Turísticos) ===== */
.cards{display:grid;grid-template-columns:1fr;gap:10px;padding:0 8px 14px}
@media(min-width:480px){.cards{gap:12px;padding:0 12px 16px}}
@media(min-width:600px){.cards{grid-template-columns:1fr 1fr}}
.card{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(74,222,128,.1)}
.card-carousel{position:relative;width:100%;height:160px;overflow:hidden;background:#1a2332}
@media(min-width:480px){.card-carousel{height:180px}}
.card-carousel-track{display:flex;height:100%;transition:transform .3s ease}
.card-carousel-track img{min-width:100%;height:100%;object-fit:cover}
.card-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);color:#fff;border:none;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .2s;backdrop-filter:blur(4px)}
.card-carousel:hover .card-nav{opacity:1}
.card-nav.prev{left:6px}
.card-nav.next{right:6px}
.card-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.card-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);transition:all .2s}
.card-dot.active{background:#4ade80;width:14px;border-radius:3px}
.card-body{padding:12px 14px 14px}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;color:#f1f5f9}
@media(min-width:480px){.card-name{font-size:15px}}
.card-desc{font-size:13px;color:#64748b;margin-bottom:10px;line-height:1.4}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.card-price{background:rgba(74,222,128,.1);color:#4ade80;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:600}
.card-price.free{background:rgba(250,204,21,.1);color:#facc15}
.card-time{color:#475569;font-size:12px}
.card-highlight{width:100%;margin-top:8px;padding:6px 10px;border-radius:8px;background:rgba(249,115,22,.1);color:#fb923c;font-size:13px;font-weight:600}
.card-directions{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.1);color:#60a5fa;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(59,130,246,.15);transition:all .2s}
.card-directions:hover{background:rgba(59,130,246,.2);border-color:#60a5fa}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-popular{background:rgba(250,204,21,.1);color:#facc15;border:1px solid rgba(250,204,21,.2)}
.badge-free{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.badge-photo{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.badge-adventure{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.badge-football{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.card-price-alt{font-size:11px;color:#475569;font-weight:400;margin-left:4px}

/* ===== TRANSPORT CARDS ===== */
.transport-card{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;padding:12px;border:1px solid rgba(255,255,255,.08);margin:0 8px 8px;box-shadow:0 4px 20px rgba(0,0,0,.15)
@media(min-width:480px){.transport-card{padding:16px;margin:0 12px 10px}};display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:transform .2s}
.transport-card:hover{transform:translateY(-1px)}
.transport-name{font-size:14px;font-weight:600;flex:1;min-width:0;color:#f1f5f9}
.transport-desc{font-size:12px;color:#64748b;flex-basis:100%}
.transport-capacity{font-size:11px;color:#475569}
.transport-price{text-align:right}
.transport-price .br{color:#4ade80;font-weight:700;font-size:15px}
.transport-price .usd{color:#60a5fa;font-size:12px}

/* ===== REVIEW CARDS ===== */
.reviews-section{padding:0 12px 12px}
.review-card{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;padding:14px 16px;border:1px solid rgba(255,255,255,.08);margin-bottom:8px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.review-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4ade80,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#000}
.review-name{font-size:14px;font-weight:600;color:#f1f5f9}
.review-stars{color:#facc15;font-size:13px;letter-spacing:1px}
.review-text{font-size:13px;color:#94a3b8;line-height:1.4}
.review-origin{font-size:11px;color:#475569;margin-top:4px}

/* ===== TIMELINE ===== */
.timeline-section{padding:0 12px 12px}
.timeline-btns{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.timeline-btn{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;padding:8px 18px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.timeline-btn.active,.timeline-btn:hover{background:rgba(74,222,128,.18);border-color:#4ade80}
.timeline-route{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.timeline-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.timeline-dot{width:12px;height:12px;border-radius:50%;background:#4ade80;margin-top:4px;flex-shrink:0}
.timeline-step:last-child .timeline-dot{background:#60a5fa}
.timeline-line{position:relative}
.timeline-step:not(:last-child) .timeline-dot::after{content:'';position:absolute;left:5px;top:16px;width:2px;height:calc(100% + 6px);background:rgba(255,255,255,.08)}
.timeline-step-info{flex:1}
.timeline-step-name{font-size:14px;font-weight:600;color:#f1f5f9}
.timeline-step-detail{font-size:12px;color:#64748b}

/* ===== QUIZ ===== */
.quiz-section{padding:0 12px 12px}
.quiz-box{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;padding:18px 14px;margin:0 auto;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 24px rgba(0,0,0,.2)}
@media(min-width:480px){.quiz-box{padding:24px}}
.quiz-title{font-size:20px;font-weight:700;margin-bottom:16px;text-align:center}
.quiz-q{font-size:16px;margin-bottom:12px;font-weight:600;color:#f1f5f9}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.quiz-opt{padding:10px 14px;border:2px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:all .2s;font-size:14px;background:rgba(255,255,255,.03);color:#cbd5e1}
.quiz-opt:hover,.quiz-opt.sel{border-color:#60a5fa;background:rgba(96,165,250,.1);color:#e2e8f0}
.quiz-next{display:block;margin:0 auto;padding:10px 28px;border:none;border-radius:8px;background:#4ade80;color:#000;font-weight:700;cursor:pointer;font-size:15px}
.quiz-result{text-align:center;padding:16px}
.quiz-result img{width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:12px}
.quiz-result-name{font-size:22px;font-weight:700;color:#4ade80;margin-bottom:8px}
.quiz-result-desc{font-size:14px;opacity:.85;margin-bottom:16px}
.quiz-restart{padding:8px 20px;border:2px solid #4ade80;background:transparent;color:#4ade80;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}

/* ===== VIDEO ===== */
.video-card{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:12px;overflow:hidden;margin:0 8px 10px;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 20px rgba(0,0,0,.15)}
@media(min-width:480px){.video-card{margin:0 12px 12px}}
.video-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.video-label{padding:10px 14px;font-size:13px;font-weight:600;color:#cbd5e1}

/* ===== RATE ===== */
.rate-section{max-width:100%;margin:16px auto;padding:20px;background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(255,255,255,.08);text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.rate-title{font-size:16px;font-weight:700;margin-bottom:12px;color:#f1f5f9}
.rate-stars{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.rate-star{font-size:32px;cursor:pointer;transition:transform .15s;opacity:.3}
.rate-star:hover,.rate-star.active{opacity:1;transform:scale(1.2)}
.rate-msg{font-size:13px;min-height:20px;color:#4ade80}
.rate-input{width:80%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#0f1628;color:#e2e8f0;font-size:13px;margin:8px 0;resize:none}
.rate-send{padding:8px 20px;border:none;border-radius:8px;background:#4ade80;color:#000;font-weight:700;cursor:pointer;font-size:13px}
.rate-send:disabled{opacity:.4;cursor:default}
.rate-list{max-width:100%;margin:0 auto 16px;text-align:left}
.rate-item{background:rgba(19,27,46,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)}
.rate-item-stars{color:#facc15;font-size:14px;margin-bottom:4px}
.rate-item-text{font-size:13px;color:#94a3b8}
.rate-item-date{font-size:11px;color:#475569;margin-top:4px}

/* ===== CRUISE ===== */
.cruise-section{max-width:100%;margin:0 auto 16px;padding:0 12px}
.cruise-card{background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.cruise-date{background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;border-radius:10px;padding:8px 10px;text-align:center;min-width:52px;flex-shrink:0}
.cruise-date-day{font-size:20px;font-weight:800;line-height:1}
.cruise-date-month{font-size:10px;font-weight:700;text-transform:uppercase}
.cruise-info{flex:1}
.cruise-ship{font-size:14px;font-weight:600;color:#f1f5f9}
.cruise-line{font-size:11px;color:#64748b;margin-top:2px}
.cruise-status{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
.cruise-status.in{background:rgba(74,222,128,.12);color:#4ade80}
.cruise-status.out{background:rgba(96,165,250,.12);color:#60a5fa}
.cruise-empty{text-align:center;padding:20px;font-size:13px;color:#64748b}

/* ===== PUSH ===== */
.push-btn{display:block;margin:12px auto;padding:10px 24px;border:none;border-radius:8px;background:#4ade80;color:#000;font-weight:700;cursor:pointer;font-size:13px}
.push-btn:disabled{opacity:.4;cursor:default}

/* ===== DASHBOARD ===== */
.dash-section{max-width:100%;margin:16px auto;padding:20px;background:rgba(19,27,46,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 20px rgba(0,0,0,.15)}

function carouselNav(btn,dir){
  var carousel=btn.parentElement;
  var idx=parseInt(carousel.dataset.idx)||0;
  var total=parseInt(carousel.dataset.total)||1;
  idx+=dir;
  if(idx<0)idx=total-1;
  if(idx>=total)idx=0;
  carousel.dataset.idx=idx;
  var track=carousel.querySelector('.card-carousel-track');
  track.style.transform='translateX(-'+(idx*100)+'%)';
  var dots=carousel.querySelectorAll('.card-dot');
  for(var i=0;i<dots.length;i++){dots[i].classList.toggle('active',i===idx);}
}

// Touch swipe for carousels
document.addEventListener('touchstart',function(e){
  var carousel=e.target.closest('.card-carousel');
  if(!carousel)return;
  carousel._tx=e.touches[0].clientX;
  carousel._ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var carousel=e.target.closest('.card-carousel');
  if(!carousel||!carousel._tx)return;
  var dx=e.changedTouches[0].clientX-carousel._tx;
  var dy=e.changedTouches[0].clientY-carousel._ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    carouselNav(carousel.querySelector(dx>0?'.prev':'.next'),dx>0?-1:1);
  }
  carousel._tx=null;
},{passive:true});

var quizStep=0,quizScore={};

function renderQuiz(){
  var box=document.getElementById('quiz-cards');
  if(!box)return;
  /* lang detected */
  if(quizStep>=QUIZ_STEPS.length){
    // Calculate result
    var counts={},best='beach',max=0;
    for(var k in quizScore){var v=quizScore[k];counts[v]=(counts[v]||0)+1;if(counts[v]>max){max=counts[v];best=v;}}
    var spotId=QUIZ_RESULT[best]||'monte-serrat';
    var spot=SPOTS.find(function(s){return s.id===spotId;})||SPOTS[0];
    var loc=spot[lang]||spot.pt;
    var t=T[lang]||T.pt;
    box.innerHTML='<div class="quiz-box quiz-result"><img src="'+spot.img+'" alt="'+loc.n+'" loading="lazy">' +
      '<div class="quiz-result-name">'+loc.n+'</div>' +
      '<div class="quiz-result-desc">'+loc.d+'</div>' +
      '<button class="quiz-restart" onclick="quizStep=0;quizScore={};renderQuiz()">'+t.quizRestart+'</button></div>';
    return;
  }
  var step=QUIZ_STEPS[quizStep];
  var t=T[lang]||T.pt;
  var h='<div class="quiz-box"><div class="quiz-title">'+t.quizTitle+'</div>';
  h+='<div class="quiz-q">'+(quizStep+1)+'/3 — '+t[step.q]+'</div><div class="quiz-opts">';
  for(var i=0;i<step.opts.length;i++){
    var label=t[step.opts[i][0]];
    var tag=step.opts[i][1];
    h+='<div class="quiz-opt" data-tag="'+tag+'" onclick="quizPick(this,this.dataset.tag)">'+label+'</div>';
  }
  h+='</div><button class="quiz-next" id="quizBtn" disabled onclick="quizStep++;renderQuiz()">';
  h+=(quizStep<2)?t.quizNext:t.quizSee;
  h+='</button></div>';
  box.innerHTML=h;
}

function quizPick(el,tag){
  var opts=el.parentElement.querySelectorAll('.quiz-opt');
  for(var i=0;i<opts.length;i++)opts[i].classList.remove('sel');
  el.classList.add('sel');
  quizScore[quizStep]=tag;
  document.getElementById('quizBtn').disabled=false;
}

var mapInstance=null;
function renderMap(){
  var t=T[lang]||T.pt;
  document.getElementById('mapTitle').textContent=t.mapTitle;
  if(typeof L==='undefined') return;
  if(!mapInstance){
    mapInstance=L.map('tourMap',{zoomControl:false}).setView([-23.955,-46.34],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'\u00a9 OpenStreetMap',maxZoom:18
    }).addTo(mapInstance);
    L.control.zoom({position:'bottomright'}).addTo(mapInstance);
    for(var i=0;i<SPOTS.length;i++){
      var s=SPOTS[i];
      var loc=s[lang]||s.pt;
      var priceTxt=s.free?t.free:s.price;
      var icon=L.divIcon({
        className:'',
        html:'<div style="background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">'+(i+1)+'</div>',
        iconSize:[28,28],iconAnchor:[14,14]
      });
      L.marker([s.lat,s.lng],{icon:icon}).addTo(mapInstance)
        .bindPopup('<div class="popup-name">'+loc.n+'</div><div class="popup-price">'+priceTxt+' \u2022 '+s.dur+'</div>');
    }
  }else{
    // Update popup content for new language
    mapInstance.eachLayer(function(layer){
      if(layer.getPopup){
        var popup=layer.getPopup();
        if(popup){
          var ll=layer.getLatLng();
          for(var i=0;i<SPOTS.length;i++){
            var s=SPOTS[i];
            if(Math.abs(s.lat-ll.lat)<0.001&&Math.abs(s.lng-ll.lng)<0.001){
              var loc=s[lang]||s.pt;
              var priceTxt=s.free?t.free:s.price;
              popup.setContent('<div class="popup-name">'+loc.n+'</div><div class="popup-price">'+priceTxt+' \u2022 '+s.dur+'</div>');
              break;
            }
          }
        }
      }
    });
  }
}

var rouletteSpinning=false;
var ROULETTE_ICONS=['\ud83d\uddfc','\u26f0\ufe0f','\u26bd','\ud83d\udcd3','\ud83c\udf0a','\ud83d\udcf7','\ud83e\uddfa','\u2b50'];
function renderRoulette(){
  var t=T[lang]||T.pt;
  document.getElementById('rouletteTitle').textContent=t.rouletteTitle;
  var sec=document.getElementById('roulette-section');
  if(!sec)return;
  var h='<div class="roulette-box">';
  h+='<div class="roulette-wheel" id="rouletteWheel"><div class="roulette-pointer"></div><div class="roulette-inner">';
  // Show 4 random spots in the wheel
  var shuffled=SPOTS.slice().sort(function(){return Math.random()-.5;}).slice(0,4);
  for(var i=0;i<4;i++){
    var icon=ROULETTE_ICONS[i%ROULETTE_ICONS.length];
    h+='<div class="roulette-slice" data-idx="'+i+'">'+icon+'</div>';
  }
  h+='</div></div>';
  h+='<button class="roulette-spin-btn" id="rouletteBtn" onclick="spinRoulette()">&#127922; '+t.rouletteSpin+'</button>';
  h+='<div class="roulette-result" id="rouletteResult">';
  h+='<div>'+t.rouletteResult+'</div>';
  h+='<div class="roulette-result-name" id="rouletteResultName"></div>';
  h+='<div class="roulette-result-desc" id="rouletteResultDesc"></div>';
  h+='<a class="roulette-result-btn" id="rouletteResultBtn" href="#" target="_blank">'+t.rouletteGo+'</a>';
  h+='</div></div>';
  sec.innerHTML=h;
  // Store shuffled spots for later
  window._rouletteSpots=shuffled;
}
function spinRoulette(){
  if(rouletteSpinning)return;
  rouletteSpinning=true;
  var btn=document.getElementById('rouletteBtn');
  var wheel=document.getElementById('rouletteWheel');
  if(!btn||!wheel)return;
  btn.disabled=true;
  var t=T[lang]||T.pt;
  // Pick random result
  var resultIdx=Math.floor(Math.random()*4);
  var spot=window._rouletteSpots[resultIdx];
  // Spin animation: random full rotations + land on result
  var spins=5+Math.floor(Math.random()*3);
  var degrees=spins*360+resultIdx*90;
  wheel.style.transform='rotate('+degrees+'deg)';
  // Highlight active slice after spin
  setTimeout(function(){
    var slices=wheel.querySelectorAll('.roulette-slice');
    for(var i=0;i<slices.length;i++){
      slices[i].classList.toggle('active',parseInt(slices[i].dataset.idx)===resultIdx);
    }
    // Show result
    var loc=spot[lang]||spot.pt;
    document.getElementById('rouletteResultName').textContent=loc.n;
    document.getElementById('rouletteResultDesc').textContent=loc.d;
    document.getElementById('rouletteResultBtn').href='https://www.google.com/maps/dir/?api=1&destination='+spot.lat+','+spot.lng;
    document.getElementById('rouletteResult').classList.add('show');
    btn.disabled=false;
    rouletteSpinning=false;
  },3200);
}

var shipTimerInterval=null;
function renderShipTimer(){
  var t=T[lang]||T.pt;
  var el=document.getElementById('shipTimer');
  if(!el)return;
  var today=new Date().toISOString().split('T')[0];
  // Find next departure
  var nextOut=null;
  for(var i=0;i<CRUISES.length;i++){
    if(CRUISES[i].type==='out'&&CRUISES[i].d>=today){
      if(!nextOut||CRUISES[i].d<nextOut.d) nextOut=CRUISES[i];
    }
  }
  if(!nextOut){
    el.innerHTML='<div class="ship-timer-none">'+t.timerNoShip+'</div>';
    return;
  }
  el.innerHTML='<div class="ship-timer-label">\ud83d\udea3 '+t.timerLabel+'</div>'+
    '<div class="ship-timer-countdown" id="timerCountdown"></div>'+
    '<div class="ship-timer-ship">\ud83d\udea3 '+nextOut.ship+'</div>';
  updateTimerCountdown(nextOut.d);
  if(shipTimerInterval) clearInterval(shipTimerInterval);
  shipTimerInterval=setInterval(function(){updateTimerCountdown(nextOut.d);},60000);
}
function updateTimerCountdown(dateStr){
  var el=document.getElementById('timerCountdown');
  if(!el)return;
  var target=new Date(dateStr+'T17:00:00');
  var now=new Date();
  var diff=target-now;
  if(diff<=0){el.innerHTML='<span style="color:#4ade80">\u2705 Navio j\u00e1 partiu!</span>';return;}
  var hrs=Math.floor(diff/3600000);
  var mins=Math.floor((diff%3600000)/60000);
  var h_label={pt:'h',en:'h',es:'h'}[lang]||'h';
  var m_label={pt:'min',en:'min',es:'min'}[lang]||'min';
  el.innerHTML='<div class="timer-unit"><div class="timer-num">'+hrs+'</div><div class="timer-label">'+h_label+'</div></div>'+
    '<div class="timer-sep">:</div>'+
    '<div class="timer-unit"><div class="timer-num">'+mins+'</div><div class="timer-label">'+m_label+'</div></div>';
}
